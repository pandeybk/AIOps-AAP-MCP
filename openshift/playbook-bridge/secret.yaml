apiVersion: v1
kind: Secret
metadata:
  name: aap-playbook-bridge-secrets
type: Opaque
stringData:
  AAP_URL: https://your-aap-server.com/api/controller/v2
  AAP_USERNAME: admin
  AAP_PASSWORD: <your-aap-password>
  AAP_VERIFY_SSL: "false"
  CONTROL_PLANE_API_KEY: <your-control-plane-api-key>
  CONTROL_PLANE_VERIFY_SSL: "false"
  KAFKA_BOOTSTRAP_SERVERS: ims-release-kafka-kafka-bootstrap.ims-demo-lab.svc.cluster.local:9092
  PLAYBOOK_GENERATION_KAFKA_TOPIC: aiops-ansible-playbook-generate-instruction
  PLAYBOOK_GENERATION_CONSUMER_GROUP_ID: aap-playbook-bridge
  PLAYBOOK_GENERATION_AUTO_OFFSET_RESET: latest
  LIGHTSPEED_TEMPLATE_NAME: Lightspeed Remediation Playbook Generator
  LIGHTSPEED_PROMPT_VAR_NAME: lightspeed_prompt
  PLAYBOOK_GENERATION_PROVIDER_NAME: aap-lightspeed
